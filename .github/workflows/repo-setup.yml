name: Repo setup

# Sets the repository description and topics (the two remaining HACS checks)
# using the built-in Actions token. Runs only when this file changes, plus a
# manual trigger, so it isn't noise on every push.
on:
  push:
    branches: [main]
    paths: [".github/workflows/repo-setup.yml"]
  workflow_dispatch:

permissions:
  administration: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Set description and topics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PATCH "/repos/${{ github.repository }}" \
            -f description='Home Assistant integration for Daikin / Airzone DKN Cloud NA air conditioners'
          gh api -X PUT "/repos/${{ github.repository }}/topics" \
            -f 'names[]=home-assistant' \
            -f 'names[]=homeassistant' \
            -f 'names[]=hacs' \
            -f 'names[]=hacs-integration' \
            -f 'names[]=daikin' \
            -f 'names[]=airzone' \
            -f 'names[]=dkn' \
            -f 'names[]=hvac' \
            -f 'names[]=climate' \
            -f 'names[]=custom-components'
